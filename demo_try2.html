<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Abyss - Cinematic Realism v6.1</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #00040a; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 40px; left: 40px; color: #70dfff;
            pointer-events: none; text-shadow: 0 0 25px rgba(0, 150, 255, 0.9);
            letter-spacing: 5px; z-index: 100;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0; font-weight: 200; font-size: 24px;">ABYSSAL REALISM v6.1</h1>
        <div style="font-size: 10px; opacity: 0.6; margin-top: 5px;">CINEMATIC ORGANIC ECOSYSTEM</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        /**
         * 环境着色器：模拟深海环境、菲涅尔边缘光及动态焦散
         */
        const CinematicShader = {
            uniforms: {
                uTime: { value: 0 },
                uColorDeep: { value: new THREE.Color(0x00060d) },
                uColorMid: { value: new THREE.Color(0x012a4a) },
                uColorLight: { value: new THREE.Color(0x89e5ff) }
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vWorldPosition;
                varying vec3 vNormal;
                varying float vFresnel;

                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPos.xyz;
                    
                    vec3 viewDir = normalize(cameraPosition - vWorldPosition);
                    vFresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);
                    
                    gl_Position = projectionMatrix * viewMatrix * worldPos;
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                varying vec3 vWorldPosition;
                varying vec3 vNormal;
                varying float vFresnel;
                uniform float uTime;
                uniform vec3 uColorDeep;
                uniform vec3 uColorMid;
                uniform vec3 uColorLight;

                float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
                
                float caustics(vec2 p) {
                    p *= 0.4;
                    float res = 0.0;
                    float t = uTime * 0.5;
                    for(int i=0; i<3; i++) {
                        vec2 q = p + float(i) * 1.5;
                        q += vec2(cos(t + q.y), sin(t + q.x));
                        res += pow(0.5 + 0.5 * sin(dot(q, q)), 12.0);
                    }
                    return res / 3.0;
                }

                void main() {
                    float depth = smoothstep(-25.0, 15.0, vWorldPosition.y);
                    vec3 color = mix(uColorDeep, uColorMid, depth);
                    
                    float causticPattern = caustics(vWorldPosition.xz + vWorldPosition.y * 0.2);
                    float lightFacing = max(vNormal.y, 0.0);
                    color += uColorLight * causticPattern * lightFacing * 0.5;
                    
                    color += vec3(0.0, 0.4, 0.7) * vFresnel * 0.3;

                    float dist = length(vWorldPosition - cameraPosition);
                    float fog = exp(-pow(dist * 0.012, 2.0));
                    vec3 fogColor = vec3(0.005, 0.015, 0.03);

                    gl_FragColor = vec4(mix(fogColor, color, fog), 1.0);
                }
            `
        };

        let scene, camera, renderer, controls, clock = new THREE.Clock();
        let mainMat, fishGroup = [], flora = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00040a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(40, 20, 70);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI / 2.1;

            mainMat = new THREE.ShaderMaterial({
                uniforms: THREE.UniformsUtils.clone(CinematicShader.uniforms),
                vertexShader: CinematicShader.vertexShader,
                fragmentShader: CinematicShader.fragmentShader
            });

            createComplexWorld();
            animate();
            window.addEventListener('resize', onWindowResize);
        }

        function createComplexWorld() {
            // 1. 地表
            const floorGeo = new THREE.PlaneGeometry(400, 400, 120, 120);
            floorGeo.rotateX(-Math.PI / 2);
            const pos = floorGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let z = pos.getZ(i);
                let h = Math.sin(x * 0.03) * Math.sin(z * 0.03) * 10;
                h += Math.sin(x * 0.2) * 1.5;
                pos.setY(i, h - 20);
            }
            floorGeo.computeVertexNormals();
            const floor = new THREE.Mesh(floorGeo, mainMat);
            scene.add(floor);

            // 2. 巨岩
            for(let i = 0; i < 25; i++) {
                createMonolith();
            }

            // 3. 生态位
            for(let i = 0; i < 250; i++) {
                const r = Math.random();
                if(r > 0.6) createSeaFan();
                else if(r > 0.3) createTubeSponge();
                else createAnemone();
            }

            // 4. 光束
            createCinematicRays();

            // 5. 微粒与鱼群
            createFloatingDebris();
            for(let i = 0; i < 60; i++) {
                const f = createFish();
                fishGroup.push(f);
                scene.add(f);
            }
        }

        function createMonolith() {
            const rockGeo = new THREE.IcosahedronGeometry(1, 1);
            const pos = rockGeo.attributes.position;
            const width = 4 + Math.random() * 8;
            const height = 12 + Math.random() * 15;
            
            for(let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let y = pos.getY(i);
                let z = pos.getZ(i);
                // 修复：将 'float' 改为 'const'，将 'floor' 改为 'Math.floor'
                const layer = Math.floor(y * 5.0) / 5.0;
                pos.setX(i, x * width + Math.sin(layer * 2.0) * 1.5);
                pos.setY(i, y * height);
                pos.setZ(i, z * width + Math.cos(layer * 2.0) * 1.5);
            }
            rockGeo.computeVertexNormals();
            const rock = new THREE.Mesh(rockGeo, mainMat);
            rock.position.set((Math.random() - 0.5) * 150, -25, (Math.random() - 0.5) * 150);
            rock.rotation.y = Math.random() * Math.PI;
            scene.add(rock);
        }

        function createSeaFan() {
            const group = new THREE.Group();
            const color = new THREE.Color().setHSL(Math.random() * 0.1, 0.8, 0.5);
            const fanGeo = new THREE.PlaneGeometry(2, 3, 4, 4);
            const pos = fanGeo.attributes.position;
            for(let i=0; i<pos.count; i++) {
                pos.setX(i, pos.getX(i) * (1.0 + pos.getY(i) * 0.5));
            }
            const fanMat = new THREE.MeshPhongMaterial({ 
                color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.8, emissive: color, emissiveIntensity: 0.2 
            });
            const fan = new THREE.Mesh(fanGeo, fanMat);
            fan.rotation.x = -0.2;
            group.add(fan);
            group.position.set((Math.random() - 0.5) * 160, -22 + Math.random() * 8, (Math.random() - 0.5) * 160);
            scene.add(group);
            flora.push(group);
        }

        function createTubeSponge() {
            const h = 2 + Math.random() * 4;
            const geo = new THREE.CylinderGeometry(0.3, 0.4, h, 8, 1, true);
            const mat = new THREE.MeshPhongMaterial({ color: 0x5533ff, shininess: 10 });
            const tube = new THREE.Mesh(geo, mat);
            tube.position.set((Math.random() - 0.5) * 160, -20 + h/2, (Math.random() - 0.5) * 160);
            scene.add(tube);
        }

        function createAnemone() {
            const color = [0xff4422, 0xffaa00, 0x00ff88][Math.floor(Math.random()*3)];
            const group = new THREE.Group();
            for(let i=0; i<8; i++) {
                const tentacle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.1, 1.5, 4),
                    new THREE.MeshPhongMaterial({ color: color })
                );
                tentacle.position.y = 0.75;
                tentacle.rotation.z = (i / 8) * Math.PI * 2;
                tentacle.rotation.x = 0.5;
                group.add(tentacle);
            }
            group.position.set((Math.random() - 0.5) * 160, -21 + Math.random()*5, (Math.random() - 0.5) * 160);
            scene.add(group);
            flora.push(group);
        }

        function createCinematicRays() {
            const rayGeo = new THREE.CylinderGeometry(0.5, 40, 250, 32, 1, true);
            const rayMat = new THREE.ShaderMaterial({
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide,
                uniforms: { uTime: { value: 0 } },
                vertexShader: `
                    varying float vAlpha;
                    void main() {
                        vAlpha = 1.0 - uv.y;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    uniform float uTime;
                    void main() {
                        float flicker = 0.8 + 0.2 * sin(uTime * 2.0);
                        gl_FragColor = vec4(0.5, 0.9, 1.0, vAlpha * 0.04 * flicker);
                    }
                `
            });
            for(let i = 0; i < 6; i++) {
                const ray = new THREE.Mesh(rayGeo, rayMat);
                ray.position.set((Math.random() - 0.5) * 180, 80, (Math.random() - 0.5) * 180);
                ray.rotation.x = 0.3 + Math.random() * 0.3;
                ray.rotation.z = (Math.random() - 0.5) * 0.5;
                ray.name = "ray";
                scene.add(ray);
            }
        }

        function createFloatingDebris() {
            const geo = new THREE.BufferGeometry();
            const count = 20000;
            const pos = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 300;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.3 });
            scene.add(new THREE.Points(geo, mat));
        }

        function createFish() {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0x44aaff, shininess: 100 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 8), mat);
            body.scale.set(3, 0.8, 0.5);
            group.add(body);
            group.position.set((Math.random() - 0.5) * 150, Math.random() * 30 - 5, (Math.random() - 0.5) * 150);
            group.userData = { speed: 0.08 + Math.random() * 0.1, phase: Math.random() * 10, dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize() };
            return group;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            mainMat.uniforms.uTime.value = t;

            scene.traverse(obj => {
                if(obj.name === "ray") obj.material.uniforms.uTime.value = t;
            });

            fishGroup.forEach(f => {
                f.position.addScaledVector(f.userData.dir, f.userData.speed);
                if(f.position.length() > 160) f.userData.dir.negate();
                f.lookAt(f.position.clone().add(f.userData.dir));
            });

            flora.forEach((f, i) => {
                f.rotation.z = Math.sin(t * 0.5 + i) * 0.1;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
