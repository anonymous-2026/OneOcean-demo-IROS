<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPD - High-Fidelity Ocean Explorer v6.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'JetBrains+Mono', monospace; color: #00f2ff; }
        canvas { display: block; }
        .hud-element { pointer-events: none; text-shadow: 0 0 10px rgba(0, 242, 255, 0.6); }
        .glass { background: rgba(0, 5, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3); }
        .active-tab { background: rgba(0, 242, 255, 0.2); border-bottom: 2px solid #00f2ff; color: #fff; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000205; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%); }
        #collision-warning { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff3333; font-weight: bold; font-size: 2rem; display: none;
            text-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 class="text-2xl font-bold tracking-[0.3em] mb-4 text-cyan-400">MOPD SYSTEM v6.0</h1>
        <div class="w-80 h-1 bg-gray-900 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-cyan-400 transition-all duration-1000" style="width: 100%"></div>
        </div>
        <p class="mt-4 text-[10px] text-cyan-800 animate-pulse uppercase">Rendering atmospheric and caustics simulation...</p>
    </div>

    <div class="vignette"></div>
    <div id="collision-warning">COLLISION WARNING</div>

    <!-- UI Overlay -->
    <div class="fixed top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none z-10">
        <div class="glass p-4 rounded-sm pointer-events-auto">
            <div class="flex gap-2 mb-3 border-b border-cyan-900 pb-2">
                <button id="btn-device-mode" class="px-3 py-1 text-xs font-bold active-tab uppercase">Pilot</button>
                <button id="btn-global-mode" class="px-3 py-1 text-xs font-bold uppercase">Analysis</button>
            </div>
            <div id="mode-desc" class="text-[9px] text-cyan-600 tracking-widest uppercase">ROV Unit: Mark-VI Elite Explorer</div>
        </div>

        <div class="glass p-5 rounded-sm pointer-events-auto w-72">
            <label class="text-[10px] font-bold text-cyan-700 block mb-2 tracking-widest uppercase">Environmental Monitoring</label>
            <select id="var-select" class="bg-black text-cyan-400 text-xs rounded-none w-full p-2 border border-cyan-900 outline-none focus:border-cyan-400">
                <option value="elevation">BATHYMETRY</option>
                <option value="thetao">TEMPERATURE</option>
                <option value="so">SALINITY</option>
                <option value="zos">SSH ANOMALY</option>
            </select>
            
            <div class="mt-6 space-y-2 border-t border-cyan-900 pt-4 text-[10px]">
                <div class="flex justify-between"><span class="text-cyan-800">SYSTEM_STATUS</span> <span class="text-cyan-400 uppercase font-bold">Optimal</span></div>
                <div class="flex justify-between"><span class="text-cyan-800">NAV_POSITION</span> <span id="pos-val" class="text-cyan-400">0, 0, 0</span></div>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="device-hud" class="fixed inset-0 flex flex-col justify-between p-10 hud-element">
        <div class="flex justify-between">
            <div class="border-l border-t border-cyan-400/20 w-40 h-40"></div>
            <div class="border-r border-t border-cyan-400/20 w-40 h-40"></div>
        </div>
        
        <div class="flex justify-between items-end">
            <div class="space-y-6">
                <div class="bg-cyan-400/5 p-4 border-l-4 border-cyan-400">
                    <div class="text-6xl font-bold tracking-tighter italic"><span id="hud-depth">0</span><span class="text-sm ml-1 text-cyan-700">M</span></div>
                    <div class="text-[10px] uppercase font-bold text-cyan-600">Altimeter</div>
                </div>
                <div class="font-bold text-2xl uppercase tracking-widest">VEL: <span id="hud-speed" class="text-white">0.0</span> <span class="text-xs">m/s</span></div>
            </div>

            <div class="text-right space-y-3 bg-black/80 p-6 border border-cyan-900/50 min-w-[240px]">
                <div class="flex justify-between text-xs tracking-wider"><span>TEMP:</span><span id="hud-temp" class="text-white">--</span></div>
                <div class="flex justify-between text-xs tracking-wider"><span>SALN:</span><span id="hud-sal" class="text-white">--</span></div>
                <div class="flex justify-between text-xs tracking-wider"><span>FLOW:</span><span id="hud-cur" class="text-white">--</span></div>
                <div class="mt-4 pt-3 border-t border-cyan-900/50">
                    <div class="flex justify-between text-[10px] mb-2 uppercase tracking-widest"><span>Integrity</span><span id="integrity-val">100%</span></div>
                    <div class="w-full h-1 bg-cyan-900/50"><div id="throttle-bar" class="h-full bg-cyan-400 shadow-[0_0_15px_#00f2ff]" style="width: 100%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * MOPD - PROFESSIONAL OCEANOGRAPHIC EXPLORER v6.0
         * 聚焦于极致真实感的海洋演示
         */
        let scene, camera, renderer, clock;
        let oceanTerrain, waterSurface, skyBox, submarine, ambientLight, sunLight, bottomLight;
        let thrusters = [], searchlights = [], beamCones = [];
        let seaweeds = [], marineSnow, currentField = [];
        let currentMode = 'device';
        const globalCamera = {
            yaw: Math.PI / 4,
            pitch: -0.35,
            distance: 320,
            target: new THREE.Vector3(0, -30, 0),
            isDragging: false,
            dragButton: 0,
            lastX: 0,
            lastY: 0
        };
        let physicsState = {
            velocity: new THREE.Vector3(),
            rotation: new THREE.Euler(0, 0, 0, 'YXZ'),
            targetRotation: new THREE.Euler(0, 0, 0, 'YXZ')
        };

        const SURFACE_Y = 20;
        const BOTTOM_Y = -60;
        const MAP_LIMIT = 500;

        window.onload = () => {
            init();
            animate();
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').remove(), 500);
            }, 1000);
        };

        function getTerrainHeight(x, z) {
            const base = (Math.sin(x * 0.03) * Math.cos(z * 0.03) * 28) +
                         (Math.sin(x * 0.12) * 8) +
                         (Math.cos(z * 0.09) * 6) +
                         (Math.sin((x + z) * 0.2) * 4);
            const trenchCenterX = 200;
            const trenchCenterZ = -150;
            const dx = x - trenchCenterX;
            const dz = z - trenchCenterZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const trenchRadius = 240;
            const trenchFalloff = THREE.MathUtils.clamp(1 - (dist / trenchRadius), 0, 1);
            const trenchDepth = -45 * trenchFalloff * trenchFalloff;
            return base + trenchDepth + BOTTOM_Y;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1520);
            scene.fog = new THREE.FogExp2(0x0a1520, 0.008);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            ambientLight = new THREE.AmbientLight(0x406080, 0.8);
            scene.add(ambientLight);
            
            sunLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
            sunLight.position.set(200, 350, -120);
            const sunTarget = new THREE.Object3D();
            sunTarget.position.set(0, 0, 0);
            scene.add(sunTarget);
            sunLight.target = sunTarget;
            scene.add(sunLight);

            bottomLight = new THREE.PointLight(0x50f0ff, 0, 80);
            scene.add(bottomLight);

            createSky();
            createTerrain();
            createRealisticWater();
            createCurrentField();
            createEnvironment();
            createIndustrialSub();
            setupControls();

            submarine.position.set(0, SURFACE_Y, 0);
            globalCamera.target.copy(submarine.position);
            setGlobalCameraFromPosition(submarine.position.clone().add(new THREE.Vector3(180, -20, 180)), submarine.position);
        }

        function createSky() {
            // 渐变天空球
            const skyGeo = new THREE.SphereGeometry(1500, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x003366) },
                    bottomColor: { value: new THREE.Color(0x88aabb) },
                    offset: { value: 33 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4( position, 1.0 );
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize( vWorldPosition + offset ).y;
                        gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h, 0.0 ), exponent ), 0.0 ) ), 1.0 );
                    }
                `,
                side: THREE.BackSide
            });
            skyBox = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyBox);

            // 远景地平线朦胧层
            const horizonGeo = new THREE.CylinderGeometry(1500, 1500, 200, 32, 1, true);
            const horizonMat = new THREE.MeshBasicMaterial({ 
                color: 0x88aabb, 
                transparent: true, 
                opacity: 0.4, 
                side: THREE.BackSide 
            });
            const horizon = new THREE.Mesh(horizonGeo, horizonMat);
            horizon.position.y = 50;
            scene.add(horizon);
        }

        function createTerrain() {
            const geo = new THREE.PlaneBufferGeometry(1200, 1200, 180, 180);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            const colors = [];
            const color = new THREE.Color();

            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i];
                const z = pos[i + 2];
                pos[i + 1] = getTerrainHeight(x, z);
                
            // Natural color gradient: shallow sand -> mid rock -> deep blue
            const depthFactor = THREE.MathUtils.clamp((pos[i+1] - (BOTTOM_Y - 45)) / 85, 0, 1);
                if (depthFactor > 0.8) {
                     color.setHSL(0.12, 0.4, 0.2 + depthFactor * 0.1); // Shallow sand
                } else if (depthFactor > 0.4) {
                     color.setHSL(0.55, 0.2, 0.05 + depthFactor * 0.1); // Mid rock
                } else {
                     color.setHSL(0.6, 0.5, 0.01 + depthFactor * 0.05); // Deep blue
                }
                colors.push(color.r, color.g, color.b);
            }
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const mat = new THREE.MeshStandardMaterial({ 
                vertexColors: true, 
                roughness: 0.85, 
                metalness: 0.1,
                flatShading: false
            });
            oceanTerrain = new THREE.Mesh(geo, mat);
            scene.add(oceanTerrain);

             // Seafloor caustics simulation (light group)
            const causticLight = new THREE.Group();
            scene.add(causticLight);
            scene.caustics = causticLight;
        }

        function createRealisticWater() {
            const geo = new THREE.PlaneBufferGeometry(4000, 4000, 180, 180);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x0a3a4a, 
                transparent: true, 
                opacity: 0.75, 
                side: THREE.DoubleSide,
                shininess: 300,
                specular: 0x55ccff
            });
            waterSurface = new THREE.Mesh(geo, mat);
            waterSurface.position.y = SURFACE_Y;
            waterSurface.originalVertices = new Float32Array(geo.attributes.position.array);
            scene.add(waterSurface);
        }

        function createCurrentField() {
            const depths = [15, 0, -20, -45];
            const fieldSize = 450;
            const spacing = 75;

            depths.forEach(y => {
                for (let x = -fieldSize; x <= fieldSize; x += spacing) {
                    for (let z = -fieldSize; z <= fieldSize; z += spacing) {
                        const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(x,y,z), 6, 0x00f2ff, 1.5, 0.6);
                        if (arrow.line && arrow.line.material) {
                            arrow.line.material.transparent = true;
                            arrow.line.material.opacity = 0.15;
                        }
                        scene.add(arrow);
                        currentField.push({ helper: arrow, baseY: y });
                    }
                }
            });
        }

        function createEnvironment() {
             // Marine snow
            const snowCount = 15000;
            const snowGeo = new THREE.BufferGeometry();
            const snowPos = new Float32Array(snowCount * 3);
            for(let i=0; i<snowCount*3; i+=3) {
                snowPos[i] = (Math.random()-0.5)*1200;
                snowPos[i+1] = (Math.random()-0.5)*200 + BOTTOM_Y;
                snowPos[i+2] = (Math.random()-0.5)*1200;
            }
            snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
            marineSnow = new THREE.Points(snowGeo, new THREE.PointsMaterial({ 
                color: 0xddffff, size: 0.1, transparent: true, opacity: 0.35 
            }));
            scene.add(marineSnow);

            const posAttr = oceanTerrain.geometry.attributes.position;
            const seaweedMat = new THREE.MeshStandardMaterial({ 
                color: 0x00220a, side: THREE.DoubleSide, emissive: 0x008855, emissiveIntensity: 0.2 
            });
            
            for (let i = 0; i < 600; i++) {
                const idx = Math.floor(Math.random() * posAttr.count);
                const cluster = new THREE.Group();
                const isGlowCoral = Math.random() > 0.75;
                
                if (isGlowCoral) {
                    const coralMat = new THREE.MeshStandardMaterial({ 
                        color: 0xff3366, emissive: 0xff1144, emissiveIntensity: 1.5 
                    });
                    const coral = new THREE.Mesh(new THREE.TorusKnotGeometry(0.4, 0.15, 24, 6), coralMat);
                    cluster.add(coral);
                } else {
                    for(let j=0; j<3; j++) {
                        const leaf = new THREE.Mesh(new THREE.PlaneBufferGeometry(0.6, 6 + Math.random()*4, 1, 8), seaweedMat);
                        leaf.translateY(3);
                        leaf.rotation.y = Math.random() * Math.PI;
                        cluster.add(leaf);
                    }
                }
                cluster.position.set(posAttr.getX(idx), posAttr.getY(idx), posAttr.getZ(idx));
                scene.add(cluster);
                seaweeds.push(cluster);
            }
        }

        function createIndustrialSub() {
            const group = new THREE.Group();
            const chassisMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            const paintMat = new THREE.MeshStandardMaterial({ color: 0xff9900, metalness: 0.4, roughness: 0.4 });
             const detailMat = new THREE.MeshStandardMaterial({ color: 0xaa0000 }); // Warning color

            const hull = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 3.6, 24), paintMat);
            hull.rotation.z = Math.PI / 2;
            group.add(hull);

            // 增加细节环
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.05, 8, 24), detailMat);
            ring.rotation.y = Math.PI/2;
            group.add(ring);

            const dome = new THREE.Mesh(new THREE.SphereGeometry(0.88, 24, 16, 0, Math.PI), new THREE.MeshPhongMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.35, shininess: 200 }));
            dome.rotation.y = -Math.PI/2;
            dome.position.x = 1.85;
            group.add(dome);

            // Thrusters
            const thrusterLocs = [[1.2,-1.0,1.1], [1.2,-1.0,-1.1], [-1.2,-1.0,1.1], [-1.2,-1.0,-1.1]];
            thrusterLocs.forEach(loc => {
                const tGroup = new THREE.Group();
                const duct = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.6, 16), chassisMat);
                duct.rotation.z = Math.PI/2;
                tGroup.add(duct);
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.9, 0.3), detailMat);
                blade.rotation.z = Math.PI/2;
                tGroup.add(blade);
                tGroup.prop = blade;
                tGroup.position.set(...loc);
                group.add(tGroup);
                thrusters.push(tGroup);
            });

            // 强力探照灯
            const lightLocs = [[2.1, 0.6, 0.8], [2.1, 0.6, -0.8]];
            lightLocs.forEach(p => {
                const spot = new THREE.SpotLight(0xffffff, 40, 250, 0.35, 0.5, 1.2);
                spot.position.set(p[0], p[1], p[2]);
                const target = new THREE.Object3D();
                target.position.set(p[0] + 50, p[1], p[2]); 
                group.add(target);
                spot.target = target;
                group.add(spot);
                searchlights.push(spot);

                const beam = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 25, 150, 32, 1, true),
                    new THREE.MeshBasicMaterial({ color: 0xccf0ff, transparent: true, opacity: 0.18, depthWrite: false, blending: THREE.AdditiveBlending })
                );
                beam.translateY(75);
                beam.rotateZ(-Math.PI/2);
                beam.position.set(...p);
                group.add(beam);
                beamCones.push(beam);
            });

            submarine = group;
            scene.add(submarine);
        }

        const keys = {};
        function setupControls() {
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            document.getElementById('btn-device-mode').onclick = () => {
                currentMode = 'device';
                updateModeUI();
            };
            document.getElementById('btn-global-mode').onclick = () => {
                currentMode = 'global';
                if (submarine) {
                    const desired = submarine.position.clone().add(new THREE.Vector3(180, -20, 180));
                    desired.y = THREE.MathUtils.clamp(desired.y, BOTTOM_Y + 10, SURFACE_Y - 5);
                    setGlobalCameraFromPosition(desired, submarine.position);
                } else {
                    globalCamera.target.set(0, -30, 0);
                    globalCamera.distance = 320;
                    globalCamera.yaw = Math.PI / 4;
                    globalCamera.pitch = -0.35;
                }
                updateGlobalCamera();
                updateModeUI();
            };
            window.addEventListener('mousemove', (e) => {
                if(currentMode === 'device' && document.pointerLockElement) {
                    physicsState.targetRotation.y -= e.movementX * 0.002;
                    physicsState.targetRotation.x -= e.movementY * 0.002;
                    physicsState.targetRotation.x = Math.max(-1.3, Math.min(1.3, physicsState.targetRotation.x));
                }
            });
            renderer.domElement.addEventListener('click', () => {
                if(currentMode === 'device') renderer.domElement.requestPointerLock();
            });
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (currentMode !== 'global') return;
                globalCamera.isDragging = true;
                globalCamera.dragButton = e.button;
                globalCamera.lastX = e.clientX;
                globalCamera.lastY = e.clientY;
            });
            window.addEventListener('mouseup', () => {
                globalCamera.isDragging = false;
            });
            window.addEventListener('mousemove', (e) => {
                if (currentMode !== 'global' || !globalCamera.isDragging) return;
                const dx = e.clientX - globalCamera.lastX;
                const dy = e.clientY - globalCamera.lastY;
                globalCamera.lastX = e.clientX;
                globalCamera.lastY = e.clientY;
                if (globalCamera.dragButton === 0) {
                    globalCamera.yaw -= dx * 0.003;
                    globalCamera.pitch -= dy * 0.003;
                    globalCamera.pitch = Math.max(-1.2, Math.min(0.3, globalCamera.pitch));
                } else {
                    const panSpeed = Math.max(0.2, globalCamera.distance * 0.002);
                    const right = new THREE.Vector3();
                    const up = new THREE.Vector3(0, 1, 0);
                    camera.getWorldDirection(right);
                    right.cross(up).normalize();
                    globalCamera.target.addScaledVector(right, -dx * panSpeed);
                    globalCamera.target.addScaledVector(up, dy * panSpeed);
                }
                updateGlobalCamera();
            });
            renderer.domElement.addEventListener('wheel', (e) => {
                if (currentMode !== 'global') return;
                e.preventDefault();
                const zoom = 1 + Math.sign(e.deltaY) * 0.08;
                globalCamera.distance = THREE.MathUtils.clamp(globalCamera.distance * zoom, 80, 1200);
                updateGlobalCamera();
            }, { passive: false });
            renderer.domElement.addEventListener('contextmenu', (e) => {
                if (currentMode === 'global') e.preventDefault();
            });
            updateModeUI();
        }

        function updateModeUI() {
            const deviceBtn = document.getElementById('btn-device-mode');
            const globalBtn = document.getElementById('btn-global-mode');
            const modeDesc = document.getElementById('mode-desc');
            const deviceHud = document.getElementById('device-hud');
            if (currentMode === 'device') {
                deviceBtn.classList.add('active-tab');
                globalBtn.classList.remove('active-tab');
                deviceHud.style.display = 'flex';
                modeDesc.textContent = 'ROV Unit: Mark-VI Elite Explorer';
            } else {
                globalBtn.classList.add('active-tab');
                deviceBtn.classList.remove('active-tab');
                deviceHud.style.display = 'none';
                modeDesc.textContent = 'Global Analysis Mode';
                if (document.pointerLockElement) {
                    document.exitPointerLock();
                }
            }
        }
        function updateGlobalCamera() {
            const cosPitch = Math.cos(globalCamera.pitch);
            const sinPitch = Math.sin(globalCamera.pitch);
            const cosYaw = Math.cos(globalCamera.yaw);
            const sinYaw = Math.sin(globalCamera.yaw);
            const offset = new THREE.Vector3(
                globalCamera.distance * cosPitch * cosYaw,
                globalCamera.distance * sinPitch,
                globalCamera.distance * cosPitch * sinYaw
            );
            camera.position.copy(globalCamera.target).add(offset);
            camera.lookAt(globalCamera.target);
        }

        function setGlobalCameraFromPosition(position, target) {
            const offset = position.clone().sub(target);
            const distance = Math.max(1, offset.length());
            const pitch = Math.asin(THREE.MathUtils.clamp(offset.y / distance, -1, 1));
            const yaw = Math.atan2(offset.z, offset.x);
            globalCamera.target.copy(target);
            globalCamera.distance = distance;
            globalCamera.pitch = pitch;
            globalCamera.yaw = yaw;
        }
        function updateEnvironment(time, subPos) {
            const depthRatio = THREE.MathUtils.clamp((SURFACE_Y - subPos.y) / (SURFACE_Y - BOTTOM_Y), 0, 1);
            
            // 真实感颜色过渡：亮天蓝 -> 深海蓝 -> 极夜黑
            const skyColor = new THREE.Color(0x88aabb);
            const oceanSurfaceColor = new THREE.Color(0x0a1a2a);
            const oceanDeepColor = new THREE.Color(0x020810);
            
            let currentEnvColor;
            if (subPos.y > 0) {
                currentEnvColor = skyColor.clone().lerp(oceanSurfaceColor, 1.0 - (subPos.y / SURFACE_Y));
            } else {
                currentEnvColor = oceanSurfaceColor.clone().lerp(oceanDeepColor, depthRatio);
            }
            
            scene.background.copy(currentEnvColor);
            scene.fog.color.copy(currentEnvColor);
            scene.fog.density = subPos.y > 0 ? 0.002 : (0.006 + depthRatio * 0.02); 
            
            ambientLight.intensity = Math.max(0.35, 1.5 * (1.0 - depthRatio * 0.8)); 
            sunLight.intensity = subPos.y > 0 ? 1.5 : (1.5 * Math.pow(1.0 - depthRatio, 2.0));

            bottomLight.position.set(subPos.x, subPos.y - 8, subPos.z);
            bottomLight.intensity = depthRatio * 3.5;

            // Enhanced surface wave animation
            const waterPos = waterSurface.geometry.attributes.position.array;
            const orig = waterSurface.originalVertices;
            for (let i = 0; i < waterPos.length; i += 3) {
                const x = orig[i];
                const z = orig[i + 2];
                const wave = Math.sin(x * 0.03 + time * 2.4) * 2.8 + 
                             Math.cos(z * 0.04 + time * 1.8) * 1.8 + 
                             Math.sin((x + z) * 0.1 + time * 3.8) * 0.7;
                waterPos[i + 1] = wave;
            }
            waterSurface.geometry.attributes.position.needsUpdate = true;

            // 海底焦散效果 (通过修改地形Emissive模拟)
            const causticIntensity = (1.0 - depthRatio) * (0.1 + Math.sin(time * 0.8) * 0.05);
            oceanTerrain.material.emissive.set(0x00ffff);
            oceanTerrain.material.emissiveIntensity = causticIntensity;

            // 洋流箭头同步
            currentField.forEach((item, idx) => {
                const helper = item.helper;
                const dFactor = (SURFACE_Y - item.baseY) / 80;
                const speed = 0.5 + Math.sin(time * 0.4 + dFactor * 6) * 0.4;
                const angle = time * 0.12 + dFactor * 2.5;
                helper.setDirection(new THREE.Vector3(Math.cos(angle), Math.sin(time * 0.3) * 0.08, Math.sin(angle)));
                helper.setLength(7 + speed * 15, 2.8, 1.4);
                
                const dist = helper.position.distanceTo(subPos);
                helper.line.material.opacity = THREE.MathUtils.clamp(1.0 - (dist / 280), 0.05, 0.4);
            });

            seaweeds.forEach((cluster, i) => {
                cluster.children.forEach(child => {
                    if (child.material.emissive) {
                        child.material.emissiveIntensity = 1.0 + Math.sin(time * 2.0 + i) * 1.0;
                    }
                });
            });

            const snowArr = marineSnow.geometry.attributes.position.array;
            for(let i=1; i<snowArr.length; i+=3) {
                snowArr[i] -= 0.06;
                if(snowArr[i] < BOTTOM_Y) snowArr[i] = SURFACE_Y + 10;
            }
            marineSnow.geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (submarine) {
                updateEnvironment(time, submarine.position);
            }

            if (currentMode === 'global') {
                updateGlobalCamera();
            }
            if (currentMode === 'device' && submarine) {
                const moveSpeed = keys['ShiftLeft'] ? 60 : 30;
                const input = new THREE.Vector3();
                if(keys['KeyW']) input.x += 1;
                if(keys['KeyS']) input.x -= 1;
                if(keys['KeyA']) input.z -= 1;
                if(keys['KeyD']) input.z += 1;
                if(keys['KeyQ']) input.y += 1.0;
                if(keys['KeyE']) input.y -= 1.0;

                physicsState.rotation.x = THREE.MathUtils.lerp(physicsState.rotation.x, physicsState.targetRotation.x, 0.1);
                physicsState.rotation.y = THREE.MathUtils.lerp(physicsState.rotation.y, physicsState.targetRotation.y, 0.1);

                const targetVel = input.applyEuler(physicsState.rotation).multiplyScalar(moveSpeed);
                physicsState.velocity.lerp(targetVel, delta * 4);
                
                const nextPos = submarine.position.clone().addScaledVector(physicsState.velocity, delta);
                
                // 物理碰撞与地形检测
                const tHeight = getTerrainHeight(nextPos.x, nextPos.z);
                const subRadius = 1.8;
                let isColliding = false;

                if (nextPos.y < tHeight + subRadius) {
                    nextPos.y = tHeight + subRadius;
                    physicsState.velocity.y = Math.max(0, physicsState.velocity.y);
                    isColliding = true;
                }

                if (Math.abs(nextPos.x) > MAP_LIMIT) { nextPos.x = Math.sign(nextPos.x) * MAP_LIMIT; isColliding = true; }
                if (Math.abs(nextPos.z) > MAP_LIMIT) { nextPos.z = Math.sign(nextPos.z) * MAP_LIMIT; isColliding = true; }
                 if (nextPos.y > SURFACE_Y + 100) nextPos.y = SURFACE_Y + 100; // Allow above-surface view

                document.getElementById('collision-warning').style.display = isColliding ? 'block' : 'none';

                submarine.position.copy(nextPos);
                submarine.rotation.copy(physicsState.rotation);

                thrusters.forEach(t => t.prop.rotation.x += physicsState.velocity.length() * 0.8 + 0.5);

                const currentDepth = Math.max(0, Math.round(SURFACE_Y - submarine.position.y));
                document.getElementById('hud-depth').innerText = currentDepth;
                document.getElementById('hud-speed').innerText = physicsState.velocity.length().toFixed(1);
                document.getElementById('hud-temp').innerText = (28 - currentDepth * 0.22).toFixed(1);
                document.getElementById('hud-sal').innerText = (34.0 + currentDepth * 0.018).toFixed(1);
                document.getElementById('hud-cur').innerText = (0.3 + (currentDepth > 50 ? 1.2 : 0)).toFixed(2);
                document.getElementById('pos-val').innerText = `${nextPos.x.toFixed(0)}, ${nextPos.y.toFixed(0)}, ${nextPos.z.toFixed(0)}`;
                
                const camOffset = new THREE.Vector3(-24, 12, 0).applyEuler(physicsState.rotation);
                camera.position.lerp(submarine.position.clone().add(camOffset), 0.12);
                camera.lookAt(submarine.position.clone().add(new THREE.Vector3(12, -5, 0).applyEuler(physicsState.rotation)));

                // 探照灯在深海更亮
                const depthRatio = THREE.MathUtils.clamp((SURFACE_Y - submarine.position.y) / (SURFACE_Y - BOTTOM_Y), 0, 1);
                const flash = (Math.random() > 0.98) ? 0.8 : 1.0;
                searchlights.forEach((s, i) => {
                    s.intensity = (40 + depthRatio * 60) * flash;
                    if (beamCones[i] && beamCones[i].material) {
                        beamCones[i].material.opacity = (currentDepth > 10 ? 0.25 : 0.08) * flash;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
