<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneOcean UUV Demo - Tasks</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: "Courier New", Courier, monospace; background: #06293b; }
    #canvas-container { width: 100vw; height: 100vh; display: block; }
    #hud {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 50;
      background: rgba(240, 240, 240, 0.92);
      color: #222;
      padding: 10px 12px;
      border-left: 5px solid #6f5cff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      font-size: 12px;
      line-height: 1.35;
      user-select: none;
      pointer-events: none;
      max-width: 380px;
    }
    #hud .title { font-weight: 700; letter-spacing: 0.5px; }
    #hud .sub { color: #444; font-size: 11px; }
    #hud .kv { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    #hud .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(111, 92, 255, 0.12);
      border: 1px solid rgba(111, 92, 255, 0.35);
      color: #2a246f;
      font-size: 11px;
      font-weight: 700;
    }
    #hud .hint { margin-top: 8px; color: #666; font-size: 10px; }
    #hud .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="hud">
    <div class="title">ONEOCEAN_TASKS_DEMO</div>
    <div class="sub">No controls (except orbit camera). Visualizing multi-UUV tasks.</div>
    <div class="kv">
      <span class="pill" id="pill-phase">Task: Pollution Cleanup</span>
      <span class="pill" id="pill-progress">0/0</span>
      <span class="pill" id="pill-time">t=0.0s</span>
    </div>
    <div class="hint">Orbit camera: drag to rotate, scroll to zoom.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

  <script>
    // Tasks page: observation-only (OrbitControls). No keyboard / UI interactions.
    // Visualizes:
    //  - Task 1: Pollution cleanup (diffusion from yellow barrels; multi-UUV approach & neutralize)
    //  - Task 2: Biological protection (fish near "shore" herded toward deep-sea region)

    // --- Deterministic-ish RNG (kept simple) ---
    let _seed = 20260227;
    function srand(s) { _seed = s >>> 0; }
    function rand() {
      // Mulberry32
      let t = _seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    srand(20260227);

    const clock = new THREE.Clock();
    const scene = new THREE.Scene();
    const fogColor = 0x0d3a55;
    scene.background = new THREE.Color(fogColor);
    scene.fog = new THREE.FogExp2(fogColor, 0.0018);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 7000);
    camera.position.set(160, 180, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = false;
    controls.minDistance = 60;
    controls.maxDistance = 1200;
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.target.set(0, 95, 0);

    // --- Lighting (mirrors index.html style) ---
    const hemiLight = new THREE.HemisphereLight(0x86d9ff, 0x062433, 0.66);
    scene.add(hemiLight);
    const dirLight = new THREE.DirectionalLight(0xbfe8ff, 0.78);
    dirLight.position.set(110, 300, 70);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 4096;
    dirLight.shadow.mapSize.height = 4096;
    dirLight.shadow.camera.left = -500; dirLight.shadow.camera.right = 500;
    dirLight.shadow.camera.top = 500; dirLight.shadow.camera.bottom = -500;
    scene.add(dirLight);

    // --- Sky Dome (matches index.html vibe; not copied from demo_ref/1.html) ---
    const skyUniforms = {
      time: { value: 0.0 },
      topColor: { value: new THREE.Color(0x1b4062) },
      horizonColor: { value: new THREE.Color(0x5ab2d6) },
      bottomColor: { value: new THREE.Color(0x041a27) }
    };
    const skyDome = new THREE.Mesh(
      new THREE.SphereGeometry(3600, 48, 32),
      new THREE.ShaderMaterial({
        uniforms: skyUniforms,
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * viewMatrix * worldPosition;
          }
        `,
        fragmentShader: `
          uniform float time;
          uniform vec3 topColor;
          uniform vec3 horizonColor;
          uniform vec3 bottomColor;
          varying vec3 vWorldPosition;
          void main() {
            vec3 p = normalize(vWorldPosition);
            float h = clamp(p.y * 0.5 + 0.5, 0.0, 1.0);
            float horizon = smoothstep(0.44, 0.54, h);
            vec3 col = mix(bottomColor, horizonColor, horizon);
            col = mix(col, topColor, smoothstep(0.62, 1.0, h));
            float band = sin((p.x * 7.0 + p.z * 6.0) + time * 0.15) * 0.5 + 0.5;
            float haze = (1.0 - smoothstep(0.50, 0.70, h)) * 0.06 * band;
            col += vec3(haze);
            gl_FragColor = vec4(col, 1.0);
          }
        `,
        side: THREE.BackSide,
        depthWrite: false,
        fog: false
      })
    );
    skyDome.frustumCulled = false;
    scene.add(skyDome);

    // --- Terrain & Water (aligned with index.html) ---
    const simplex = new SimplexNoise(rand);
    const MAP_SIZE = 1800;
    const MAP_HALF_SIZE = MAP_SIZE / 2;
    const MAX_ALT = 280.0;
    const REEF_FLOOR = -40.0;
    const WATER_SURFACE_Y = 170.0;

    function getTerrainHeight(x, z) {
      const broad = simplex.noise2D(x * 0.0018, z * 0.0018) * 26;
      const medium = simplex.noise2D(x * 0.006, z * 0.006) * 10;
      const fine = simplex.noise2D(x * 0.028, z * 0.028) * 2.2;
      const ridge = Math.sin(x * 0.0017 + z * 0.0022) * 8;
      const trench1 = -42 * Math.exp(-((x + 260) ** 2) / 90000 - ((z - 180) ** 2) / 260000);
      const trench2 = -35 * Math.exp(-((x - 420) ** 2) / 130000 - ((z + 260) ** 2) / 110000);
      const crack = -24 * Math.exp(-((z + 0.28 * x - 120) ** 2) / 2800);
      const escarp = Math.max(0, (Math.sqrt(x * x + z * z) - 520) * 0.03);
      return REEF_FLOOR + broad + medium + fine + ridge + trench1 + trench2 + crack + escarp;
    }

    // Seabed
    const vertexCount = 620;
    const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, vertexCount, vertexCount);
    groundGeo.rotateX(-Math.PI / 2);
    const groundPos = groundGeo.attributes.position;
    const colors = [];
    const cDeep = new THREE.Color(0x082733);
    const cShallow = new THREE.Color(0x4f7f79);
    for (let i = 0; i < groundPos.count; i++) {
      const x = groundPos.getX(i);
      const z = groundPos.getZ(i);
      const h = getTerrainHeight(x, z);
      groundPos.setY(i, h);
      const t = Math.max(0, Math.min(1, (h - REEF_FLOOR + 8) / 28));
      const c = cDeep.clone().lerp(cShallow, t);
      colors.push(c.r, c.g, c.b);
    }
    groundGeo.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
    groundGeo.computeVertexNormals();
    const groundMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.95,
      metalness: 0.0,
      flatShading: true,
      emissive: new THREE.Color(0x0b2a35),
      emissiveIntensity: 0.0
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.receiveShadow = true;
    scene.add(ground);

    // Water surface detail
    function getSurfaceWave(x, z, time) {
      const base = Math.sin(x * 0.03 + time * 2.4) * 1.7
        + Math.cos(z * 0.04 + time * 1.8) * 1.1
        + Math.sin((x + z) * 0.1 + time * 3.8) * 0.45;
      const swell = Math.sin(x * 0.012 + z * 0.009 + time * 0.9) * 0.6;
      const micro = Math.sin((x * 0.055 - z * 0.045) + time * 1.9) * 0.18;
      const wn = simplex.noise3D(x * 0.004, z * 0.004, time * 0.2) * 0.25;
      return base + swell + micro + wn;
    }

    const waterGeo = new THREE.PlaneGeometry(MAP_SIZE * 1.04, MAP_SIZE * 1.04, 240, 240);
    waterGeo.rotateX(-Math.PI / 2);
    const waterPos = waterGeo.attributes.position;
    const waterBase = Float32Array.from(waterPos.array);
    for (let i = 0; i < waterPos.count; i++) {
      const x = waterPos.getX(i);
      const z = waterPos.getZ(i);
      waterPos.setY(i, WATER_SURFACE_Y + getSurfaceWave(x, z, 0));
    }
    const waterSurface = new THREE.Mesh(
      waterGeo,
      new THREE.MeshPhongMaterial({
        color: 0x0a3a4a,
        specular: 0x55ccff,
        shininess: 300,
        transparent: true,
        opacity: 0.78,
        side: THREE.DoubleSide,
        depthWrite: false
      })
    );
    waterSurface.receiveShadow = false;
    scene.add(waterSurface);

    // --- Environment clutter: rocks + seagrass + coral + shells (lighter version for tasks) ---
    const dummy = new THREE.Object3D();

    // Rocks (instanced)
    const rockGeo = new THREE.DodecahedronGeometry(1.0, 0);
    rockGeo.translate(0, 0.65, 0);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x5f6366, roughness: 0.95, flatShading: true });
    const rockMesh = new THREE.InstancedMesh(rockGeo, rockMat, 1200);
    rockMesh.castShadow = true;
    rockMesh.receiveShadow = true;
    let rockCount = 0;
    for (let i = 0; i < 26000 && rockCount < 1200; i++) {
      const x = (rand() - 0.5) * 1600;
      const z = (rand() - 0.5) * 1600;
      const h = getTerrainHeight(x, z);
      if (h < REEF_FLOOR - 18 || h > 55) continue;
      dummy.position.set(x, h - 0.05, z);
      const s = 0.7 + rand() * 3.6;
      dummy.scale.set(s * (0.75 + rand() * 0.55), s, s * (0.75 + rand() * 0.55));
      dummy.rotation.set(rand() * Math.PI, rand() * Math.PI, rand() * Math.PI);
      dummy.updateMatrix();
      rockMesh.setMatrixAt(rockCount++, dummy.matrix);
    }
    rockMesh.count = rockCount;
    scene.add(rockMesh);

    // Seagrass
    const grassGeo = new THREE.ConeGeometry(0.25, 3.2, 6, 1);
    grassGeo.translate(0, 1.6, 0);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x2c8a6e, roughness: 0.85, metalness: 0.0 });
    const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, 5200);
    grassMesh.castShadow = false;
    grassMesh.receiveShadow = true;
    let grassCount = 0;
    for (let i = 0; i < 140000 && grassCount < 5200; i++) {
      const x = (rand() - 0.5) * 1700;
      const z = (rand() - 0.5) * 1700;
      const h = getTerrainHeight(x, z);
      if (h < REEF_FLOOR - 12 || h > 50) continue;
      const cluster = 0.5 + 0.5 * simplex.noise2D(x * 0.006, z * 0.006);
      if (rand() > Math.min(1.0, cluster * 0.72)) continue;
      dummy.position.set(x, h + 0.1, z);
      const s = 0.35 + rand() * 1.25;
      dummy.scale.set(s * (0.85 + rand() * 0.4), s * (0.9 + rand() * 0.5), s * (0.85 + rand() * 0.4));
      dummy.rotation.set((rand() - 0.5) * 0.2, rand() * Math.PI * 2, (rand() - 0.5) * 0.2);
      dummy.updateMatrix();
      grassMesh.setMatrixAt(grassCount++, dummy.matrix);
    }
    grassMesh.count = grassCount;
    scene.add(grassMesh);

    // Coral
    const coralGeo = new THREE.IcosahedronGeometry(0.8, 0);
    coralGeo.translate(0, 0.6, 0);
    const coralMat = new THREE.MeshStandardMaterial({ color: 0xb57a53, roughness: 0.9, metalness: 0.02, flatShading: true });
    const coralMesh = new THREE.InstancedMesh(coralGeo, coralMat, 1800);
    coralMesh.castShadow = true;
    coralMesh.receiveShadow = true;
    let coralCount = 0;
    for (let i = 0; i < 70000 && coralCount < 1800; i++) {
      const x = (rand() - 0.5) * 1700;
      const z = (rand() - 0.5) * 1700;
      const h = getTerrainHeight(x, z);
      if (h < REEF_FLOOR - 10 || h > 44) continue;
      const cluster = 0.5 + 0.5 * simplex.noise2D(x * 0.0045 + 120, z * 0.0045 + 60);
      if (rand() > Math.min(1.0, cluster * 0.55)) continue;
      dummy.position.set(x, h + 0.08, z);
      const s = 0.45 + rand() * 2.1;
      dummy.scale.setScalar(s);
      dummy.rotation.set(0, rand() * Math.PI * 2, 0);
      dummy.updateMatrix();
      coralMesh.setMatrixAt(coralCount++, dummy.matrix);
    }
    coralMesh.count = coralCount;
    scene.add(coralMesh);

    // Shells
    const shellGeo = new THREE.SphereGeometry(0.5, 10, 8);
    shellGeo.scale(1.2, 0.55, 0.95);
    shellGeo.translate(0, 0.1, 0);
    const shellMat = new THREE.MeshStandardMaterial({ color: 0xd9d2c4, roughness: 0.92, metalness: 0.05, flatShading: true });
    const shellMesh = new THREE.InstancedMesh(shellGeo, shellMat, 1600);
    shellMesh.castShadow = false;
    shellMesh.receiveShadow = true;
    let shellCount = 0;
    for (let i = 0; i < 80000 && shellCount < 1600; i++) {
      const x = (rand() - 0.5) * 1700;
      const z = (rand() - 0.5) * 1700;
      const h = getTerrainHeight(x, z);
      if (h < REEF_FLOOR - 12 || h > 55) continue;
      const sand = 0.5 + 0.5 * simplex.noise2D(x * 0.004, z * 0.004);
      if (rand() > Math.min(1.0, sand * 0.65)) continue;
      dummy.position.set(x, h + 0.12, z);
      const s = 0.22 + rand() * 0.85;
      dummy.scale.set(s * (0.75 + rand() * 0.5), s, s * (0.75 + rand() * 0.5));
      dummy.rotation.set((rand() - 0.5) * 0.4, rand() * Math.PI * 2, (rand() - 0.5) * 0.4);
      dummy.updateMatrix();
      shellMesh.setMatrixAt(shellCount++, dummy.matrix);
    }
    shellMesh.count = shellCount;
    scene.add(shellMesh);

    // --- Current particles (visual "flow") ---
    const currentCount = 4200;
    const currentGeo = new THREE.BufferGeometry();
    const cPos = new Float32Array(currentCount * 3);
    const cVel = new Float32Array(currentCount);
    for (let i = 0; i < currentCount; i++) {
      cPos[i * 3] = (Math.random() - 0.5) * (MAP_SIZE * 0.95);
      cPos[i * 3 + 1] = Math.random() * (MAX_ALT - REEF_FLOOR) + REEF_FLOOR;
      cPos[i * 3 + 2] = (Math.random() - 0.5) * (MAP_SIZE * 0.95);
      cVel[i] = 0.55 + Math.random() * 1.6;
    }
    currentGeo.setAttribute("position", new THREE.BufferAttribute(cPos, 3));
    const currentPts = new THREE.Points(
      currentGeo,
      new THREE.PointsMaterial({ color: 0x8ce9ff, size: 0.9, transparent: true, opacity: 0.5, sizeAttenuation: true })
    );
    scene.add(currentPts);

    function getCurrentAt(pos, time) {
      const scale = 0.0022;
      const timeScale = 0.09;
      const bx = simplex.noise2D(pos.x * 0.0012, time * 0.06);
      const bz = simplex.noise2D(pos.z * 0.0012 + 100, time * 0.06);
      let wind = new THREE.Vector3(bx, 0, bz).normalize().multiplyScalar(4.8);
      wind.x += simplex.noise3D(pos.x * scale, pos.z * scale, time * timeScale) * 1.8;
      wind.z += simplex.noise3D(pos.x * scale + 100, pos.z * scale + 100, time * timeScale) * 1.8;
      const th = getTerrainHeight(pos.x, pos.z);
      let occ = 1.0;
      if (pos.y < th + 24) occ *= 0.25 + 0.75 * Math.max(0, (pos.y - th) / 24);
      wind.multiplyScalar(occ);
      if (wind.length() > 11) wind.multiplyScalar(11 / wind.length());
      return wind;
    }

    // --- Pollution clusters (Task 1) ---
    function createPollutionBarrel() {
      const group = new THREE.Group();
      const barrelYellowMat = new THREE.MeshStandardMaterial({
        color: 0xf3d24a,
        roughness: 0.55,
        metalness: 0.12,
        emissive: 0x3a2c00,
        emissiveIntensity: 0.08
      });
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 2.2, 18), barrelYellowMat);
      group.add(barrel);
      const ringMat = new THREE.MeshStandardMaterial({ color: 0x2f3235, roughness: 0.75, metalness: 0.15 });
      const ring1 = new THREE.Mesh(new THREE.TorusGeometry(1.02, 0.08, 8, 18), ringMat);
      ring1.position.y = 0.76;
      ring1.rotation.x = Math.PI / 2;
      group.add(ring1);
      const ring2 = ring1.clone();
      ring2.position.y = -0.76;
      group.add(ring2);
      const stripe = new THREE.Mesh(
        new THREE.TorusGeometry(0.98, 0.06, 8, 18),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.85 })
      );
      stripe.rotation.x = Math.PI / 2;
      group.add(stripe);
      const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(0.95, 0.95),
        new THREE.MeshBasicMaterial({ color: 0xf3d24a, side: THREE.DoubleSide })
      );
      sign.position.set(0, 0.2, 1.03);
      group.add(sign);
      const hazard = new THREE.Mesh(
        new THREE.RingGeometry(0.14, 0.28, 3),
        new THREE.MeshBasicMaterial({ color: 0x1a1a1a, side: THREE.DoubleSide })
      );
      hazard.position.copy(sign.position.clone().add(new THREE.Vector3(0, 0.0, 0.02)));
      hazard.rotation.z = Math.PI / 6;
      group.add(hazard);
      return group;
    }

    function createPollutionCluster(id, x, z) {
      const baseY = getTerrainHeight(x, z) + 1.1;
      const center = new THREE.Vector3(x, baseY, z);

      const barrel = createPollutionBarrel();
      barrel.position.copy(center);
      scene.add(barrel);

      const plumeMat = new THREE.MeshPhongMaterial({
        color: 0x4cff87,
        transparent: true,
        opacity: 0.20,
        shininess: 120,
        depthWrite: false
      });
      const plume = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 24), plumeMat);
      plume.position.copy(center);
      plume.castShadow = false;
      plume.receiveShadow = false;
      scene.add(plume);

      // Diffusion particles (simple outward + current drift)
      const PCOUNT = 1600;
      const pGeo = new THREE.BufferGeometry();
      const pArr = new Float32Array(PCOUNT * 3);
      const pBase = new Float32Array(PCOUNT * 3);
      const pVelArr = new Float32Array(PCOUNT * 3);
      for (let i = 0; i < PCOUNT; i++) {
        const ang = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.9;
        const y = (Math.random() - 0.5) * 0.6;
        pArr[i * 3] = center.x + Math.cos(ang) * r;
        pArr[i * 3 + 1] = center.y + y;
        pArr[i * 3 + 2] = center.z + Math.sin(ang) * r;
        pBase.set(pArr.subarray(i * 3, i * 3 + 3), i * 3);

        const v = new THREE.Vector3(Math.cos(ang), (Math.random() - 0.5) * 0.15, Math.sin(ang)).normalize().multiplyScalar(0.6 + Math.random() * 1.1);
        pVelArr[i * 3] = v.x;
        pVelArr[i * 3 + 1] = v.y;
        pVelArr[i * 3 + 2] = v.z;
      }
      pGeo.setAttribute("position", new THREE.BufferAttribute(pArr, 3));
      const pMat = new THREE.PointsMaterial({
        color: 0x76ff99,
        size: 1.15,
        transparent: true,
        opacity: 0.55,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const pts = new THREE.Points(pGeo, pMat);
      scene.add(pts);

      return {
        id,
        center,
        barrel,
        plume,
        pts,
        pArr,
        pBase,
        pVelArr,
        radius: 1.0,
        maxRadius: 38.0,
        cleaned: false,
        cleanTime: 0
      };
    }

    const pollutionClusters = [
      createPollutionCluster("P1", -40, 10),
      createPollutionCluster("P2", 55, -30),
      createPollutionCluster("P3", 15, 70)
    ];

    // --- UUV model (simplified from index.html) ---
    function createUUV(accentColor = 0x223f50) {
      const g = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color: accentColor, roughness: 0.52, metalness: 0.22 });
      const hull = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.3, 9.5, 24), bodyMat);
      hull.rotation.x = Math.PI / 2;
      g.add(hull);
      const nose = new THREE.Mesh(new THREE.SphereGeometry(1.15, 18, 14), bodyMat);
      nose.position.z = -4.9;
      g.add(nose);
      const tail = new THREE.Mesh(new THREE.ConeGeometry(1.15, 2.2, 18), bodyMat);
      tail.rotation.x = -Math.PI / 2;
      tail.position.z = 5.35;
      g.add(tail);
      const band = new THREE.Mesh(new THREE.TorusGeometry(1.35, 0.14, 10, 28), new THREE.MeshStandardMaterial({ color: 0x2f576d, roughness: 0.6 }));
      band.rotation.x = Math.PI / 2;
      band.position.z = -0.3;
      g.add(band);

      const finMat = new THREE.MeshStandardMaterial({ color: 0x2e5f74, roughness: 0.62 });
      const finTop = new THREE.Mesh(new THREE.BoxGeometry(0.24, 1.35, 1.65), finMat); finTop.position.set(0, 1.16, 2.45); g.add(finTop);
      const finBottom = new THREE.Mesh(new THREE.BoxGeometry(0.24, 1.1, 1.25), finMat); finBottom.position.set(0, -1.02, 2.75); g.add(finBottom);
      const finLeft = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.16, 1.35), finMat); finLeft.position.set(-1.12, 0.02, 2.55); finLeft.rotation.z = 0.2; g.add(finLeft);
      const finRight = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.16, 1.35), finMat); finRight.position.set(1.12, 0.02, 2.55); finRight.rotation.z = -0.2; g.add(finRight);

      const propGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.06, 11);
      const propMat = new THREE.MeshBasicMaterial({ color: 0x1f1f1f, transparent: true, opacity: 0.9 });
      const ductMat = new THREE.MeshStandardMaterial({ color: 0x3a4752, roughness: 0.48, metalness: 0.35 });
      const strutMat = new THREE.MeshStandardMaterial({ color: 0x4a5660, roughness: 0.55, metalness: 0.22 });
      const props = [];
      const podPositions = [
        { x: -1.55, y: 0.95, z: 3.15 },
        { x: 1.55, y: 0.95, z: 3.15 },
        { x: -1.55, y: -0.95, z: 3.15 },
        { x: 1.55, y: -0.95, z: 3.15 }
      ];
      podPositions.forEach(pos => {
        const strut = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.15, 8), strutMat);
        strut.position.set(pos.x * 0.74, pos.y * 0.74, pos.z - 0.35);
        strut.rotation.z = Math.atan2(pos.x, 1.8);
        g.add(strut);

        const duct = new THREE.Mesh(new THREE.CylinderGeometry(0.66, 0.66, 0.35, 18), ductMat);
        duct.position.set(pos.x, pos.y, pos.z);
        duct.rotation.x = Math.PI / 2;
        g.add(duct);

        const p = new THREE.Mesh(propGeo, propMat);
        p.position.set(pos.x, pos.y, pos.z);
        p.rotation.x = Math.PI / 2;
        g.add(p);
        props.push(p);
      });

      // Spotlights (always on)
      const frontLight = new THREE.SpotLight(0x9ff7ff, 2.0, 220, Math.PI / 7.5, 0.55, 1.0);
      frontLight.position.set(0, 0.6, -4.9);
      frontLight.target.position.set(0, 0.2, -40);
      g.add(frontLight);
      g.add(frontLight.target);
      const downLight = new THREE.SpotLight(0xbef7ff, 1.6, 160, Math.PI / 6.8, 0.55, 1.0);
      downLight.position.set(0, -0.45, -0.5);
      downLight.target.position.set(0, -40, -0.5);
      g.add(downLight);
      g.add(downLight.target);

      // Neutralizer spray cone (only visible during cleaning)
      const spray = new THREE.Mesh(
        new THREE.ConeGeometry(1.15, 6.5, 16, 1, true),
        new THREE.MeshBasicMaterial({
          color: 0xb3fff6,
          transparent: true,
          opacity: 0.0,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          side: THREE.DoubleSide
        })
      );
      spray.rotation.x = Math.PI / 2;
      spray.position.set(0, 0, -6.3);
      g.add(spray);

      g.userData = { props, frontLight, downLight, spray };
      g.scale.set(0.42, 0.42, 0.42);
      return g;
    }

    const vehicles = [];
    const VEHICLE_COUNT = 5;
    for (let i = 0; i < VEHICLE_COUNT; i++) {
      const v = createUUV(0x223f50);
      v.position.set(120 + i * 12, 105 + (i % 2) * 4, 120 - i * 14);
      v.rotation.y = Math.PI + i * 0.2;
      v.userData.motion = {
        vel: new THREE.Vector3(),
        mode: "POLLUTION",
        sub: "TRAVEL",
        hold: 0,
        idx: i
      };
      scene.add(v);
      vehicles.push(v);
    }

    function steerTo(vObj, targetPos, dt, speed) {
      const motion = vObj.userData.motion;
      const pos = vObj.position;
      const to = targetPos.clone().sub(pos);
      const dist = to.length();
      if (dist < 1e-6) return { dist: 0 };
      to.multiplyScalar(1 / dist);
      const desired = to.multiplyScalar(speed);
      motion.vel.lerp(desired, 0.08);
      pos.addScaledVector(motion.vel, dt);
      // Face velocity direction
      const yaw = Math.atan2(motion.vel.x, motion.vel.z);
      if (isFinite(yaw)) vObj.rotation.y = yaw;
      // Gentle pitch to suggest motion (underwater vehicle)
      const pitch = THREE.MathUtils.clamp(-motion.vel.length() / 45, -0.22, 0.12);
      vObj.rotation.x = THREE.MathUtils.lerp(vObj.rotation.x, pitch, 0.06);
      // Clamp below surface (never leave water)
      const surf = WATER_SURFACE_Y - 2.0;
      if (pos.y > surf) pos.y = surf;
      // Avoid terrain
      const th = getTerrainHeight(pos.x, pos.z) + 3.2;
      if (pos.y < th) pos.y = th;
      return { dist };
    }

    // --- Task 2: Fish school ---
    const fish = [];
    const FISH_COUNT = 90;
    const fishGeo = new THREE.ConeGeometry(0.25, 0.9, 7);
    fishGeo.rotateX(Math.PI / 2);
    const fishMat = new THREE.MeshStandardMaterial({ color: 0x7ad0ff, roughness: 0.55, metalness: 0.08 });
    const fishMesh = new THREE.InstancedMesh(fishGeo, fishMat, FISH_COUNT);
    fishMesh.castShadow = false;
    fishMesh.receiveShadow = false;
    scene.add(fishMesh);

    // Define a "near shore" region as a shallower patch closer to map edge (visual is subtle but location is fixed)
    const fishSpawnCenter = new THREE.Vector3(-520, 120, 520);
    fishSpawnCenter.y = Math.min(WATER_SURFACE_Y - 18, Math.max(getTerrainHeight(fishSpawnCenter.x, fishSpawnCenter.z) + 22, 95));
    const deepSeaTarget = new THREE.Vector3(520, 85, -420);
    deepSeaTarget.y = Math.max(getTerrainHeight(deepSeaTarget.x, deepSeaTarget.z) + 14, 65);

    for (let i = 0; i < FISH_COUNT; i++) {
      const ang = Math.random() * Math.PI * 2;
      const r = Math.random() * 28;
      const pos = new THREE.Vector3(
        fishSpawnCenter.x + Math.cos(ang) * r,
        fishSpawnCenter.y + (Math.random() - 0.5) * 10,
        fishSpawnCenter.z + Math.sin(ang) * r
      );
      const vel = new THREE.Vector3((Math.random() - 0.5), (Math.random() - 0.5) * 0.1, (Math.random() - 0.5)).normalize().multiplyScalar(6 + Math.random() * 5);
      fish.push({ pos, vel });
    }

    // --- Scenario / State Machine ---
    const hudPhase = document.getElementById("pill-phase");
    const hudProgress = document.getElementById("pill-progress");
    const hudTime = document.getElementById("pill-time");

    const scenario = {
      phase: "POLLUTION", // POLLUTION -> FISH -> DONE
      clusterIndex: 0,
      cleanedCount: 0,
      clusterCleanHold: 7.5, // seconds of spraying to neutralize
      transitionHold: 2.0,
      tPhase: 0
    };

    function setSpray(vehicle, visible, lenScale) {
      const spray = vehicle.userData.spray;
      if (!spray) return;
      if (!visible) {
        spray.material.opacity = 0.0;
        return;
      }
      spray.scale.set(1.0, Math.max(0.35, lenScale), 1.0);
      spray.material.opacity = 0.28 + 0.18 * Math.sin(clock.getElapsedTime() * 9.0);
    }

    function updateVehicleProps(vehicle, dt) {
      const props = vehicle.userData.props || [];
      const speed = vehicle.userData.motion?.vel?.length?.() || 0;
      const spin = (8.0 + speed * 0.18) * dt;
      for (const p of props) p.rotation.z += spin;
      // Keep spotlights large/bright, depth-aware (but not too dark)
      const depthNorm = Math.max(0, Math.min(1, (vehicle.position.y - REEF_FLOOR) / (MAX_ALT - REEF_FLOOR)));
      vehicle.userData.frontLight.intensity = 2.0 + (1 - depthNorm) * 1.2;
      vehicle.userData.downLight.intensity = 1.6 + (1 - depthNorm) * 1.1;
    }

    function updatePollutionCluster(cluster, dt, time) {
      if (!cluster.cleaned) {
        cluster.radius = Math.min(cluster.maxRadius, cluster.radius + dt * 1.45);
      } else {
        cluster.cleanTime += dt;
      }

      // Plume size + subtle wobble (diffusion)
      const wob = 1.0 + 0.05 * Math.sin(time * 1.4 + cluster.center.x * 0.02) + 0.03 * Math.sin(time * 2.7);
      cluster.plume.scale.setScalar(cluster.radius * wob);
      cluster.plume.material.opacity = cluster.cleaned
        ? Math.max(0, 0.18 - cluster.cleanTime * 0.03)
        : 0.18 + 0.03 * Math.sin(time * 1.1);
      cluster.plume.material.color.setHex(cluster.cleaned ? 0x6aa6ad : 0x4cff87);

      // Particles drift outward + current
      const posAttr = cluster.pts.geometry.attributes.position;
      const arr = posAttr.array;
      const center = cluster.center;
      for (let i = 0; i < cluster.pArr.length; i += 3) {
        const px = arr[i], py = arr[i + 1], pz = arr[i + 2];
        const p = new THREE.Vector3(px, py, pz);
        if (!cluster.cleaned) {
          const wind = getCurrentAt(p, time);
          arr[i] += (cluster.pVelArr[i] + wind.x * 0.12) * dt;
          arr[i + 1] += (cluster.pVelArr[i + 1]) * dt;
          arr[i + 2] += (cluster.pVelArr[i + 2] + wind.z * 0.12) * dt;
          // Soft clamp within plume radius (keeps diffusion around source)
          const dx = arr[i] - center.x;
          const dz = arr[i + 2] - center.z;
          const r = Math.sqrt(dx * dx + dz * dz);
          const maxR = cluster.radius * 1.15;
          if (r > maxR) {
            const k = maxR / Math.max(1e-6, r);
            arr[i] = center.x + dx * k;
            arr[i + 2] = center.z + dz * k;
          }
        } else {
          // Freeze diffusion once cleaned (stop spreading)
          // Slowly fade particles by pulling them back toward center.
          arr[i] = THREE.MathUtils.lerp(arr[i], cluster.pBase[i], 0.04);
          arr[i + 1] = THREE.MathUtils.lerp(arr[i + 1], cluster.pBase[i + 1], 0.04);
          arr[i + 2] = THREE.MathUtils.lerp(arr[i + 2], cluster.pBase[i + 2], 0.04);
        }
      }
      posAttr.needsUpdate = true;
      cluster.pts.material.color.setHex(cluster.cleaned ? 0x9fb4b7 : 0x76ff99);
      cluster.pts.material.opacity = cluster.cleaned
        ? Math.max(0, 0.48 - cluster.cleanTime * 0.05)
        : 0.55;
    }

    function updateFish(dt, time, herdersActive) {
      // Simplified schooling + herding:
      // - baseline drift toward deepSeaTarget
      // - repulsion from vehicles (herders) pushes school forward
      const tmp = new THREE.Vector3();
      const tmp2 = new THREE.Vector3();
      for (let i = 0; i < fish.length; i++) {
        const f = fish[i];
        // Goal drift
        tmp.copy(deepSeaTarget).sub(f.pos);
        const distToGoal = Math.max(1e-6, tmp.length());
        tmp.multiplyScalar(1 / distToGoal);
        const goal = tmp.multiplyScalar(2.0);

        // Small curl noise
        const n = simplex.noise3D(f.pos.x * 0.003, f.pos.z * 0.003, time * 0.25);
        const swirl = new THREE.Vector3(Math.cos(n * Math.PI * 2), 0, Math.sin(n * Math.PI * 2)).multiplyScalar(0.9);

        // Repulsion from herders
        const repel = new THREE.Vector3();
        if (herdersActive) {
          for (let vi = 0; vi < vehicles.length; vi++) {
            const v = vehicles[vi];
            const d = f.pos.distanceTo(v.position);
            if (d < 55) {
              tmp2.copy(f.pos).sub(v.position);
              tmp2.y *= 0.15;
              const strength = (1 - d / 55) ** 2 * 9.0;
              tmp2.normalize().multiplyScalar(strength);
              repel.add(tmp2);
            }
          }
        }

        f.vel.addScaledVector(goal, dt);
        f.vel.addScaledVector(swirl, dt);
        f.vel.addScaledVector(repel, dt);

        // Speed clamp
        const sp = f.vel.length();
        const maxSp = 16.0;
        if (sp > maxSp) f.vel.multiplyScalar(maxSp / sp);

        f.pos.addScaledVector(f.vel, dt);

        // Keep fish below surface and above terrain
        const surf = WATER_SURFACE_Y - 8.0;
        if (f.pos.y > surf) f.pos.y = surf;
        const th = getTerrainHeight(f.pos.x, f.pos.z) + 6.0;
        if (f.pos.y < th) f.pos.y = th;
      }

      // Write instanced transforms
      for (let i = 0; i < fish.length; i++) {
        const f = fish[i];
        dummy.position.copy(f.pos);
        const yaw = Math.atan2(f.vel.x, f.vel.z);
        const pitch = THREE.MathUtils.clamp(-f.vel.y * 0.04, -0.35, 0.35);
        dummy.rotation.set(pitch, yaw, 0);
        const s = 0.75 + 0.25 * Math.sin(time * 1.2 + i);
        dummy.scale.set(s, s, s);
        dummy.updateMatrix();
        fishMesh.setMatrixAt(i, dummy.matrix);
      }
      fishMesh.instanceMatrix.needsUpdate = true;
    }

    function updateScenario(dt, time) {
      scenario.tPhase += dt;

      if (scenario.phase === "POLLUTION") {
        const active = pollutionClusters[scenario.clusterIndex];
        hudPhase.textContent = "Task: Pollution Cleanup";
        hudProgress.textContent = `${scenario.cleanedCount}/${pollutionClusters.length}`;

        // Keep camera focused on active cluster (viewer can still orbit freely)
        controls.target.lerp(active.center.clone().add(new THREE.Vector3(0, 10, 0)), 0.03);

        // Each vehicle approaches from different azimuth and then cleans
        const ringR = 16.0;
        const closeR = 4.0;
        let allClose = true;
        for (let i = 0; i < vehicles.length; i++) {
          const v = vehicles[i];
          const motion = v.userData.motion;

          const ang = (i / vehicles.length) * Math.PI * 2 + time * 0.02;
          const approach = active.center.clone().add(new THREE.Vector3(Math.cos(ang) * ringR, 0, Math.sin(ang) * ringR));
          approach.y = Math.max(getTerrainHeight(approach.x, approach.z) + 16, active.center.y + 5);
          approach.y = Math.min(approach.y, WATER_SURFACE_Y - 10);

          // Final close-in point (very near source)
          const near = active.center.clone().add(new THREE.Vector3(Math.cos(ang) * closeR, 0, Math.sin(ang) * closeR));
          near.y = active.center.y + 1.3;

          if (active.cleaned) {
            motion.sub = "WAIT";
            setSpray(v, false);
            steerTo(v, approach, dt, 22);
          } else if (motion.sub === "TRAVEL") {
            setSpray(v, false);
            const d = steerTo(v, approach, dt, 26).dist;
            if (d < 8.5) motion.sub = "CLEAN_APPROACH";
          } else if (motion.sub === "CLEAN_APPROACH") {
            setSpray(v, false);
            const d = steerTo(v, near, dt, 20).dist;
            if (d < 2.8) {
              motion.sub = "CLEAN";
              motion.hold = 0;
            }
          } else if (motion.sub === "CLEAN") {
            // Hold close, face source, spray neutralizer
            const d = v.position.distanceTo(active.center);
            allClose = allClose && d < 6.0;
            v.position.lerp(near, 0.06);
            const to = active.center.clone().sub(v.position).normalize();
            v.rotation.y = Math.atan2(to.x, to.z);
            v.rotation.x = THREE.MathUtils.lerp(v.rotation.x, 0.06, 0.06);

            motion.hold += dt;
            setSpray(v, true, d / 6.5);

            if (motion.hold >= scenario.clusterCleanHold) {
              motion.sub = "TRAVEL";
              setSpray(v, false);
            }
          } else {
            setSpray(v, false);
            steerTo(v, approach, dt, 22);
          }

          updateVehicleProps(v, dt);
        }

        // If enough time spraying has passed for all vehicles, mark cluster cleaned.
        // Use a robust criterion: once the slowest vehicle finishes its hold, we flip the cluster.
        if (!active.cleaned) {
          const minHold = Math.min(...vehicles.map(v => v.userData.motion.hold || 0));
          if (minHold >= scenario.clusterCleanHold && allClose) {
            active.cleaned = true;
            scenario.cleanedCount += 1;
            scenario.tPhase = 0;
          }
        }

        // Advance to next cluster after a brief hold
        if (active.cleaned && scenario.tPhase > scenario.transitionHold) {
          scenario.clusterIndex += 1;
          scenario.tPhase = 0;
          for (const v of vehicles) {
            v.userData.motion.sub = "TRAVEL";
            v.userData.motion.hold = 0;
          }
          if (scenario.clusterIndex >= pollutionClusters.length) {
            scenario.phase = "FISH";
            scenario.tPhase = 0;
          }
        }
      } else if (scenario.phase === "FISH") {
        hudPhase.textContent = "Task: Biological Protection";
        hudProgress.textContent = "Herd fish to deep sea";

        // Focus between fish center and deep target (still orbitable)
        const schoolCenter = fish.reduce((acc, f) => acc.add(f.pos), new THREE.Vector3()).multiplyScalar(1 / fish.length);
        controls.target.lerp(schoolCenter, 0.03);

        // Move vehicles behind school, pushing toward deepSeaTarget
        const forward = deepSeaTarget.clone().sub(schoolCenter);
        forward.y = 0;
        const forwardLen = Math.max(1e-6, forward.length());
        forward.multiplyScalar(1 / forwardLen);
        const behind = forward.clone().multiplyScalar(-38);
        const lateral = new THREE.Vector3(-forward.z, 0, forward.x);

        for (let i = 0; i < vehicles.length; i++) {
          const v = vehicles[i];
          const lane = (i - (vehicles.length - 1) / 2) / Math.max(1, (vehicles.length - 1) / 2);
          const tgt = schoolCenter.clone()
            .add(behind)
            .add(lateral.clone().multiplyScalar(lane * 26));
          tgt.y = Math.min(WATER_SURFACE_Y - 12, Math.max(getTerrainHeight(tgt.x, tgt.z) + 18, schoolCenter.y));
          setSpray(v, false);
          steerTo(v, tgt, dt, 22);
          updateVehicleProps(v, dt);
        }

        updateFish(dt, time, true);

        // Finish when school reaches deep target vicinity
        const dGoal = schoolCenter.distanceTo(deepSeaTarget);
        if (dGoal < 55 && scenario.tPhase > 10) {
          scenario.phase = "DONE";
          scenario.tPhase = 0;
        }
      } else {
        hudPhase.textContent = "Tasks Completed";
        hudProgress.textContent = "All done";
        updateFish(dt, time, false);
        for (const v of vehicles) {
          setSpray(v, false);
          updateVehicleProps(v, dt);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);
      const time = clock.getElapsedTime();

      skyDome.position.copy(camera.position);
      skyUniforms.time.value = time;

      // Update water waves
      const waterArr = waterSurface.geometry.attributes.position.array;
      for (let i = 0; i < waterArr.length; i += 3) {
        const bx = waterBase[i];
        const bz = waterBase[i + 2];
        waterArr[i + 1] = WATER_SURFACE_Y + getSurfaceWave(bx, bz, time);
      }
      waterSurface.geometry.attributes.position.needsUpdate = true;
      if (((time * 60) | 0) % 6 === 0) waterSurface.geometry.computeVertexNormals();

      // Current particle drift
      const cArr = currentGeo.attributes.position.array;
      for (let i = 0; i < currentCount; i++) {
        const idx = i * 3;
        const p = new THREE.Vector3(cArr[idx], cArr[idx + 1], cArr[idx + 2]);
        const wind = getCurrentAt(p, time);
        cArr[idx] += wind.x * 0.12 * dt * cVel[i];
        cArr[idx + 2] += wind.z * 0.12 * dt * cVel[i];
        // wrap
        if (cArr[idx] > MAP_HALF_SIZE) cArr[idx] = -MAP_HALF_SIZE;
        if (cArr[idx] < -MAP_HALF_SIZE) cArr[idx] = MAP_HALF_SIZE;
        if (cArr[idx + 2] > MAP_HALF_SIZE) cArr[idx + 2] = -MAP_HALF_SIZE;
        if (cArr[idx + 2] < -MAP_HALF_SIZE) cArr[idx + 2] = MAP_HALF_SIZE;
      }
      currentGeo.attributes.position.needsUpdate = true;

      // Update pollution visuals (even after phase change, keep them visible/fading)
      for (const cl of pollutionClusters) updatePollutionCluster(cl, dt, time);

      // Depth-aware lighting shimmer (subtle)
      const depthRef = controls.target.y;
      const depthNorm = Math.max(0, Math.min(1, (depthRef - REEF_FLOOR) / (MAX_ALT - REEF_FLOOR)));
      const shimmer = 0.985 + 0.012 * Math.sin(time * 0.8) + 0.008 * Math.sin(time * 1.6 + 1.3);
      const baseHemi = 0.26 + (0.36 + depthNorm * 0.72) * 0.58;
      const baseDir = 0.2 + (0.36 + depthNorm * 0.72) * 0.65;
      hemiLight.intensity = baseHemi * shimmer;
      dirLight.intensity = baseDir * shimmer;
      groundMat.emissiveIntensity = (0.015 + 0.02 * (1 - depthNorm)) * (0.65 + 0.35 * Math.sin(time * 0.9));

      updateScenario(dt, time);
      hudTime.textContent = `t=${time.toFixed(1)}s`;
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize fish transforms (hidden under task 1 at first, but present)
    updateFish(0.016, 0.0, false);
    animate();
  </script>
</body>
</html>
